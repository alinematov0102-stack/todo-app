<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="output.css" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-[#0d0714] p-4 text-amber-100 font-sans">
    <div class="max-w-[500px] mx-auto pt-10">
      <div class="flex items-center justify-between gap-3 mb-10">
        <input
          id="taskInput"
          class="flex-1 h-[45px] bg-transparent border border-[#3e1671] rounded-xl px-4 text-white outline-none focus:border-[#9e78cf] transition shadow-inner"
          type="text"
          placeholder="Yangi vazifa qo'shing..."
          onkeydown="if (event.key === 'Enter') addTask();"
        />

        <button
          id="addTask"
          class="w-[45px] h-[45px] rounded-xl bg-[#9e78cf] text-black text-2xl font-bold flex items-center justify-center cursor-pointer hover:bg-[#b08de3] active:scale-95 transition"
          onclick="addTask()"
        >
          +
        </button>
      </div>

      <div id="todoSection" class="hidden w-full mb-8">
        <h2
          class="text-white text-sm mb-4 opacity-80 uppercase tracking-widest"
        >
          Tasks to do -
          <span id="todoCount" class="text-[#9e78cf] font-bold">0</span>
        </h2>
        <div id="todoList" class="flex flex-col gap-3"></div>
      </div>

      <div id="doneSection" class="hidden w-full">
        <h2
          class="text-white text-sm mb-4 opacity-80 uppercase tracking-widest"
        >
          Done - <span id="doneCount" class="text-[#9e78cf] font-bold">0</span>
        </h2>
        <div id="doneList" class="flex flex-col gap-3 opacity-60"></div>
      </div>
    </div>

    <script src="todo.js"></script>
  </body>
</html>
